<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог автозапчастей — японские, корейские, китайские авто</title>

  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a30;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #22c55e;
      --tg: #0088cc;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      padding-bottom: 100px;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 0 16px; }
    h1, h2 { margin: 0 0 0.5em; font-weight: 600; }
    h1 { font-size: clamp(1.25rem, 3vw, 1.5rem); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn--tg { background: var(--tg); color: #fff; }
    .btn--outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn--sm { padding: 6px 12px; font-size: 13px; }
    .chip {
      display: inline-block;
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      margin: 4px 4px 4px 0;
      transition: border-color 0.2s, background 0.2s;
    }
    .chip:hover, .chip.active { border-color: var(--accent); background: rgba(34, 197, 94, 0.1); }
    .chip-list { display: flex; flex-wrap: wrap; gap: 0; margin: 8px 0 16px; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    input::placeholder { color: var(--muted); }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .top-bar {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .top-bar__row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    .top-bar .field { flex: 1 1 160px; min-width: 140px; }
    .top-bar .field--wide { flex: 2 1 220px; }
    .filters-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .filters-bar .field { min-width: 120px; max-width: 160px; }
    .filters-bar .field label { margin-bottom: 2px; }
    .sort-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .sort-row .count { color: var(--muted); font-size: 14px; }
    .catalog { padding: 16px 0 24px; }
    .cards { display: grid; gap: 16px; }
    .card {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }
    .card__check { flex-shrink: 0; margin-top: 2px; }
    .card__check input { width: auto; margin: 0; }
    .card__body { flex: 1; min-width: 0; }
    .card__title { font-size: 1.05rem; margin-bottom: 6px; }
    .card__title mark { background: rgba(34, 197, 94, 0.35); color: inherit; padding: 0 2px; border-radius: 2px; }
    .card__meta { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .card__meta span { margin-right: 10px; }
    .card__note { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .card__price { font-weight: 600; margin-bottom: 8px; }
    .card__actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .send-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: none;
      z-index: 100;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .send-bar.show { display: flex; }
    .send-bar .btn { min-width: 200px; }
    .send-bar .count { color: var(--muted); font-size: 14px; }
    @media (max-width: 768px) {
      .filters-bar .field { min-width: 100%; max-width: none; }
    }
  </style>
</head>

    function normalize(s) {
      if (!s) return "";
      return String(s).toLowerCase().replace(/\s+/g, " ").replace(/[-–—]/g, " ").trim();
    }
    function latinToRu(s) {
      const map = { "a":"а","b":"б","v":"в","g":"г","d":"д","e":"е","yo":"ё","zh":"ж","z":"з","i":"и","y":"й","k":"к","l":"л","m":"м","n":"н","o":"о","p":"п","r":"р","s":"с","t":"т","u":"у","f":"ф","h":"х","ts":"ц","ch":"ч","sh":"ш","sch":"щ","yu":"ю","ya":"я" };
      let r = s;
      for (const [lat, ru] of Object.entries(map)) r = r.replace(new RegExp(lat, "gi"), ru);
      return r;
    }
    function searchTokens(str) {
      const n = normalize(str);
      const nRu = latinToRu(n);
      return (n + " " + nRu).split(/\s+/).filter(Boolean);
    }

      return [p.name, p.category, p.make, p.model, p.engineCode, p.bodyCode, p.oem, p.keywords, p.id].filter(Boolean).join(" ");
    }
    function matchPart(part, tokens) {
      const text = normalize(partSearchText(part));
      for (const t of tokens) {
        const tNorm = normalize(t);
        if (tNorm.length < 2) continue;
        if (text.indexOf(tNorm) === -1 && text.indexOf(latinToRu(tNorm)) === -1) return false;
      }
      return true;
    }
    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }
    function escapeRe(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }
    function highlight(str, tokens) {
      if (!str || !tokens.length) return escapeHtml(str);
      const norm = normalize(str);
      const len = str.length;
      const markRanges = [];
      tokens.forEach(t => {
        const tNorm = normalize(t);
        if (tNorm.length < 2) return;
        const alt = latinToRu(tNorm);
        const re = new RegExp("(" + escapeRe(tNorm) + "|" + escapeRe(alt) + ")", "gi");
        let m;
        while ((m = re.exec(norm)) !== null) {
          markRanges.push([m.index, m.index + m[0].length]);
        }
      });
      markRanges.sort((a, b) => a[0] - b[0] || a[1] - b[1]);
      let out = "";
      let pos = 0;
      let lastEnd = 0;
      for (let i = 0; i < markRanges.length; i++) {
        const [s0, s1] = markRanges[i];
        if (s0 < lastEnd) continue;
        lastEnd = s1;
        out += escapeHtml(str.substring(pos, s0)) + "<mark>" + escapeHtml(str.substring(s0, s1)) + "</mark>";
        pos = s1;
      }
      out += escapeHtml(str.substring(pos, len));
      return out;
    }

    function buildMessageForParts(parts, deliveryCity) {
      const city = (deliveryCity && deliveryCity.trim()) ? deliveryCity.trim() : "не указан";
      if (parts.length === 0) {
        return "Здравствуйте! Интересуют автозапчасти. Доставка в: " + city + ". Подскажите наличие и цену.";
      }
      const lines = parts.map((p, i) => {
        const params = [p.engineCode, p.bodyCode].filter(Boolean).join(", ") || "—";
        return (i + 1) + ". " + p.name + ", артикул " + p.id + ", " + p.make + " " + p.model + (params !== "—" ? ", " + params : "") + ".";
      });
      return "Здравствуйте! Интересуют запчасти:\n\n" + lines.join("\n") + "\n\nДоставка в: " + city + ". Есть в наличии?";
    }
    function tgUrl(text) {
      const base = TELEGRAM_LINK.replace(/\/$/, "");
      return base + (text ? "?text=" + encodeURIComponent(text) : "");
    }

    let activeCategoryChip = null;
    function getFilters() {
      const tokens = searchEl.value.trim() ? searchTokens(searchEl.value) : [];
      return {
        searchTokens: tokens,
        country: filterCountry.value,
        category: filterCategory.value,
        make: filterMake.value,
        condition: filterCondition.value,
        availability: filterAvailability.value,
        chipCategory: activeCategoryChip
      };
    }
    function filterAndSort() {
      const f = getFilters();
      let list = partsData.slice();
      if (f.searchTokens.length) list = list.filter(p => matchPart(p, f.searchTokens));
      if (f.country) list = list.filter(p => ORIGIN_BY_MAKE[p.make] === f.country);
      if (f.category) list = list.filter(p => p.category === f.category);
      if (f.chipCategory) list = list.filter(p => p.category === f.chipCategory);
      if (f.make) list = list.filter(p => p.make === f.make);
      if (f.condition) list = list.filter(p => p.condition === f.condition);
      if (f.availability) list = list.filter(p => p.availability === f.availability);
      if (sortEl.value === "price") list.sort((a, b) => (a.price ?? 1e9) - (b.price ?? 1e9));
      return list;
    }
    function updateSendBar() {
      const n = selectedIds.size;
      selectedCountEl.textContent = "Выбрано: " + n;
      if (n > 0) {
        sendBar.classList.add("show");
        const parts = partsData.filter(p => selectedIds.has(p.id));
        sendTgEl.href = tgUrl(buildMessageForParts(parts, deliveryCityEl.value));
      } else {
        sendBar.classList.remove("show");
      }
    }
    function renderCards() {
      const list = filterAndSort();
      const f = getFilters();
      countEl.textContent = "Найдено: " + list.length;
      cardsEl.innerHTML = "";
      list.forEach(part => {
        const priceStr = part.price != null ? part.price.toLocaleString("ru-RU") + " ₽" : "Запросить цену";
        const titleHtml = f.searchTokens.length ? highlight(part.name, f.searchTokens) : escapeHtml(part.name);
        const checked = selectedIds.has(part.id) ? " checked" : "";
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML =
          "<div class=\"card__check\"><label><input type=\"checkbox\" data-part-id=\"" + escapeHtml(part.id) + "\"" + checked + "> В запрос</label></div>" +
          "<div class=\"card__body\">" +
          "<div class=\"card__title\">" + titleHtml + "</div>" +
          "<div class=\"card__meta\">" +
          "<span>" + escapeHtml(part.category) + "</span>" +
          "<span>" + escapeHtml(part.make + " " + part.model) + "</span>" +
          "<span>" + escapeHtml(part.condition) + "</span>" +
          "<span>" + escapeHtml(part.availability) + "</span>" +
          "</div>" +
          (part.note ? "<div class=\"card__note\">" + escapeHtml(part.note) + "</div>" : "") +
          "<div class=\"card__price\">" + priceStr + "</div>" +
          "<div class=\"card__actions\">" +
          "<a href=\"" + tgUrl(buildMessageForParts([part], deliveryCityEl.value)) + "\" target=\"_blank\" rel=\"noopener\" class=\"btn btn--tg btn--sm\">Спросить в Telegram</a>" +
          "</div></div>";
        cardsEl.appendChild(card);
      });
      cardsEl.querySelectorAll("input[data-part-id]").forEach(cb => {
        cb.addEventListener("change", function() {
          const id = this.getAttribute("data-part-id");
          if (this.checked) selectedIds.add(id); else selectedIds.delete(id);
          updateSendBar();
        });
      });
    }

    filterCountry.addEventListener("change", function() {
      const country = this.value;
      filterMake.querySelectorAll("option").forEach(o => {
        const origin = o.getAttribute("data-origin");
        if (origin == null) { o.hidden = false; return; }
        o.hidden = country ? origin !== country : false;
      });
      if (!country) filterMake.value = "";
      else if (filterMake.value && filterMake.querySelector("option[value='" + filterMake.value + "']")?.hidden) filterMake.value = "";
      renderCards();
    });
    chips.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", function() {
        const cat = this.getAttribute("data-cat");
        if (activeCategoryChip === cat) {
          activeCategoryChip = null;
          this.classList.remove("active");
        } else {
          chips.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
          activeCategoryChip = cat;
          this.classList.add("active");
        }
        filterCategory.value = activeCategoryChip || "";
        renderCards();
      });
    });
    searchEl.addEventListener("input", renderCards);
    deliveryCityEl.addEventListener("input", updateSendBar);
    deliveryCityEl.addEventListener("change", updateSendBar);
    filterCategory.addEventListener("change", function() {
      activeCategoryChip = this.value || null;
      chips.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chips.querySelectorAll(".chip").forEach(c => { if (c.getAttribute("data-cat") === activeCategoryChip) c.classList.add("active"); });
      renderCards();
    });
    filterMake.addEventListener("change", renderCards);
    filterCondition.addEventListener("change", renderCards);
    filterAvailability.addEventListener("change", renderCards);
    sortEl.addEventListener("change", renderCards);

    sendTgEl.addEventListener("click", function() {
      if (selectedIds.size === 0) {
        this.href = tgUrl(buildMessageForParts([], deliveryCityEl.value));
      }
    });

    renderCards();
    updateSendBar();
  })();
  </script>
</body>
</html>
